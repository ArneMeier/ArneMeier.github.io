# Basic Information
title: Arne Meier
position: Professor
affiliation: Leibniz University Hannover, Institute for Theoretical Computer Science, Research Group Algorithms
affiliation_link: https://www.thi.uni-hannover.de/en/rg-algo
email: meier (at) thi (dot) uni-hannover (dot) de

# Search Engine Optimization (SEO)
description: "Professor at Leibniz Universität Hannover. Research in complexity theory,
  logic in computer science, parameterised complexity, enumeration, and argumentation."
keywords: complexity algorithms enumeration logic

# Links
google_scholar: https://scholar.google.de/citations?user=iHkXyuoAAAAJ&hl=de
#cv_link: assets/files/curriculum_vitae.pdf
github_link: https://github.com/ArneMeier
#twitter: https://twitter.com/ArneMeier
mastodon: https://mastodon.social/@ArneM
dblp: https://dblp.uni-trier.de/pid/38/5700.html

# Images
avatar: /assets/img/arne.jpg
#favicon: ./assets/img/favicon.png
#favicon_dark: ./assets/img/favicon-dark.png

# Footnote
enable_footnote: true

# Google Analytics ID
google_analytics: G-5N6XVJ0Z4M


# The following files will be removed from the generated website.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - README_zh_Hans.md
  - README_zh_Hant.md
  - README_de.md
  - LICENSE
  - minimal-light.gemspec

# Jekyll Scholar
scholar:
  style: apa
  locale: en
  sort_by: year
  order: descending
  source: ./bibliography
  bibliography_list_tag: ol
  bibliography_item_tag: li     # jekyll-scholar wraps each entry in <li>;
                                 # bib.html outputs only the inner <div class="pub-item">
  bibliography_template: bib    # uses _layouts/bib.html for each entry
  replace_strings: true
  join_strings:    true

  details_dir:    bibliography
  details_layout: bibtex.html
  details_link:   Details

  query: "@*"

plugins:
  - jekyll-scholar
