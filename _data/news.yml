# _data/news.yml
#
# Manuelle News-Einträge für Dinge, die NICHT automatisch aus den
# BibTeX-Dateien generiert werden können:
#   - Angenommene Paper, die noch keine DOI / keinen bib-Eintrag haben
#   - Grants, Awards, Eingeladene Vorträge, sonstige Ankündigungen
#
# Felder:
#   date   – Anzeige-Datum (z.B. "June 2026")
#   html   – Inhalt als HTML-Snippet (Links, Fettschrift etc. erlaubt)
#
# Sobald ein Paper einen DOI hat und in die .bib-Datei aufgenommen wurde,
# einfach den Eintrag hier löschen – es erscheint dann automatisch im
# Abschnitt „Recent Papers".

